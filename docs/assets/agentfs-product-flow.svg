<svg width="900" height="460" viewBox="0 0 900 460" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">AgentFS product flow</title>
  <desc id="desc">AgentFS connects a user's repository, the afs runtime, the .agent.db store, and an AI agent through a pruned context flow.</desc>
  <style>
    .panel { fill: #f8fafc; stroke: #dbe3ee; stroke-width: 2; }
    .card { fill: #ffffff; stroke: #cbd5e1; stroke-width: 1.5; }
    .card-purple { fill: #faf5ff; stroke: #d8b4fe; stroke-width: 2; }
    .card-green { fill: #f0fdf4; stroke: #bbf7d0; stroke-width: 2; }
    .boundary { stroke: #ef4444; stroke-width: 3; stroke-dasharray: 7 7; }
    .flow-track { stroke: #e2e8f0; stroke-width: 5; stroke-linecap: round; stroke-linejoin: round; }
    .flow-line { stroke: #6366f1; stroke-width: 5; stroke-linecap: round; stroke-linejoin: round; stroke-dasharray: 12 14; animation: agentfs-flow 1.25s linear infinite; }
    .ingest-line { stroke: #a855f7; stroke-width: 2.5; stroke-linecap: round; stroke-dasharray: 5 6; }
    .index-line { stroke: #4f46e5; stroke-width: 2.5; stroke-linecap: round; stroke-linejoin: round; }
    .pulse { animation: agentfs-pulse 3s ease-in-out infinite; }
    .font { font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
    .title { font-size: 14px; font-weight: 750; fill: #0f172a; }
    .sub { font-size: 11px; font-weight: 520; fill: #64748b; }
    .tiny { font-size: 10px; font-weight: 700; fill: #475569; }
    .tag { font-size: 10px; font-weight: 800; fill: #ffffff; letter-spacing: .2px; }
    .metric { font-size: 10px; font-weight: 800; fill: #166534; }
    @keyframes agentfs-flow { to { stroke-dashoffset: -26; } }
    @keyframes agentfs-pulse {
      0%, 100% { fill: #f8fafc; stroke: #cbd5e1; }
      50% { fill: #ecfdf5; stroke: #86efac; }
    }
  </style>

  <rect x="0" y="0" width="900" height="460" rx="24" fill="#ffffff"/>

  <rect x="24" y="26" width="496" height="408" rx="18" class="panel"/>
  <rect x="38" y="40" width="128" height="26" rx="13" fill="#2563eb"/>
  <text x="102" y="57" text-anchor="middle" class="font tag">USER DOMAIN</text>

  <path d="M548 34V426" class="boundary"/>
  <g transform="translate(493 214)">
    <rect x="0" y="0" width="110" height="28" rx="14" fill="#ef4444"/>
    <text x="55" y="18" text-anchor="middle" class="font tag">Trust Boundary</text>
  </g>

  <rect x="580" y="26" width="296" height="408" rx="18" class="panel"/>
  <rect x="596" y="40" width="128" height="26" rx="13" fill="#059669"/>
  <text x="660" y="57" text-anchor="middle" class="font tag">AGENT DOMAIN</text>

  <g transform="translate(58 104)">
    <rect x="0" y="0" width="170" height="112" rx="14" class="card"/>
    <g transform="translate(70 22)" stroke="#2563eb" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round" fill="none">
      <path d="M28 25a3 3 0 0 1-3 3H5a3 3 0 0 1-3-3V8a3 3 0 0 1 3-3h7l3 4h10a3 3 0 0 1 3 3z"/>
    </g>
    <text x="85" y="75" text-anchor="middle" class="font title">Repository</text>
    <text x="85" y="93" text-anchor="middle" class="font sub">source tree + Git</text>
  </g>

  <g transform="translate(294 104)">
    <rect x="0" y="0" width="178" height="112" rx="14" class="card-purple"/>
    <g transform="translate(76 24)" stroke="#9333ea" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round" fill="none">
      <polyline points="4 18 12 10 4 2"/>
      <line x1="16" y1="20" x2="28" y2="20"/>
    </g>
    <text x="89" y="75" text-anchor="middle" class="font title">afs Runtime</text>
    <text x="89" y="93" text-anchor="middle" class="font sub">Rust CLI engine</text>
  </g>

  <g transform="translate(180 292)">
    <rect x="0" y="0" width="190" height="118" rx="14" class="card"/>
    <g transform="translate(79 20)" stroke="#4f46e5" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round" fill="none">
      <ellipse cx="17" cy="6" rx="17" ry="6"/>
      <path d="M0 6v13c0 3.2 7.6 6 17 6s17-2.8 17-6V6"/>
      <path d="M0 19v13c0 3.2 7.6 6 17 6s17-2.8 17-6V19"/>
    </g>
    <text x="95" y="80" text-anchor="middle" class="font title">.agent.db</text>
    <text x="95" y="98" text-anchor="middle" class="font sub">memory-mapped store</text>
  </g>

  <path d="M228 160H294" class="ingest-line"/>
  <text x="261" y="149" text-anchor="middle" class="font tiny">ingest</text>

  <path d="M383 216V250H276V292" class="index-line"/>
  <text x="392" y="251" class="font tiny">zero-parse index</text>

  <path d="M370 352H728V250" class="flow-track"/>
  <path d="M370 352H728V250" class="flow-line"/>

  <g transform="translate(448 308)">
    <rect x="0" y="0" width="152" height="30" rx="15" class="pulse" stroke-width="1.5"/>
    <text x="76" y="19" text-anchor="middle" class="font metric">Pruned Context</text>
  </g>
  <text x="525" y="374" text-anchor="middle" class="font tiny" fill="#15803d">directory-scoped rules, hooks, and memory</text>

  <g transform="translate(638 130)">
    <rect x="0" y="0" width="184" height="120" rx="14" class="card-green"/>
    <g transform="translate(76 24)" stroke="#0284c7" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round" fill="none">
      <rect x="0" y="7" width="34" height="28" rx="6"/>
      <path d="M8 0v7M26 0v7M10 19h.01M24 19h.01M9 28h16"/>
    </g>
    <text x="92" y="80" text-anchor="middle" class="font title">AI Agent Turn</text>
    <text x="92" y="98" text-anchor="middle" class="font sub">context injected</text>
  </g>

  <g transform="translate(628 306)">
    <rect x="0" y="0" width="204" height="64" rx="14" fill="#ffffff" stroke="#bbf7d0" stroke-width="1.5"/>
    <text x="102" y="24" text-anchor="middle" class="font title">Preview Contract</text>
    <text x="102" y="43" text-anchor="middle" class="font sub">init, add, status, doctor</text>
  </g>
</svg>
